sonar.projectKey=property256
sonar.projectName=property256
sonar.projectVersion=1.0

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

sonar.test.inclusions=test/**/*.dart
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/build/**
sonar.coverage.exclusions=**/*.g.dart,**/*.freezed.dart,**/build/**,lib/main.dart,lib/core/routing/**,lib/core/theme/**

sonar.dart.lcov.reportPaths=coverage/lcov.info
