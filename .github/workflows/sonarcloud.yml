name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Calculate test coverage summary
        id: test_coverage
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          lcov_path = Path("coverage/lcov.info")
          if not lcov_path.exists():
              raise SystemExit("coverage/lcov.info was not generated by flutter test --coverage")

          lines_found = 0
          lines_hit = 0
          for line in lcov_path.read_text().splitlines():
              if line.startswith("LF:"):
                  lines_found += int(line.split(":", 1)[1])
              elif line.startswith("LH:"):
                  lines_hit += int(line.split(":", 1)[1])

          percent = 0.0 if lines_found == 0 else (lines_hit / lines_found) * 100
          formatted_percent = f"{percent:.2f}"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as output:
              output.write(f"coverage_percent={formatted_percent}\n")
              output.write(f"coverage_hit={lines_hit}\n")
              output.write(f"coverage_found={lines_found}\n")
          PY

      - name: Add coverage to job summary
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Line Coverage: **${{ steps.test_coverage.outputs.coverage_percent }}%**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Covered lines: **${{ steps.test_coverage.outputs.coverage_hit }} / ${{ steps.test_coverage.outputs.coverage_found }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce minimum coverage quality gate
        run: |
          COVERAGE_PERCENT="${{ steps.test_coverage.outputs.coverage_percent }}"
          MINIMUM_COVERAGE="60.00"

          python3 - "$COVERAGE_PERCENT" "$MINIMUM_COVERAGE" <<'PY'
          import sys

          current = float(sys.argv[1])
          minimum = float(sys.argv[2])

          if current < minimum:
              raise SystemExit(
                  f"Coverage quality gate failed: {current:.2f}% is below required {minimum:.2f}%"
              )

          print(f"Coverage quality gate passed: {current:.2f}% >= {minimum:.2f}%")
          PY

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce maximum duplication quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          PROJECT_KEY="$(sed -n 's/^sonar.projectKey=\(.*\)$/\1/p' sonar-project.properties)"

          if [[ -z "$PROJECT_KEY" ]]; then
            echo "Unable to find sonar.projectKey in sonar-project.properties"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MEASURE_URL="https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&pullRequest=${PR_NUMBER}&metricKeys=duplicated_lines_density"
          else
            MEASURE_URL="https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&branch=${REF_NAME}&metricKeys=duplicated_lines_density"
          fi

          curl -sS -u "${SONAR_TOKEN}:" "${MEASURE_URL}" -o duplication_measure.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          threshold = 10.0
          payload = json.loads(Path("duplication_measure.json").read_text())
          measures = payload.get("component", {}).get("measures", [])

          duplication_value = None
          for measure in measures:
              if measure.get("metric") == "duplicated_lines_density":
                  duplication_value = measure.get("value")
                  break

          if duplication_value is None:
              raise SystemExit("Unable to read duplicated_lines_density from SonarCloud response")

          duplication_percent = float(duplication_value)
          if duplication_percent > threshold:
              raise SystemExit(
                  f"Duplication quality gate failed: {duplication_percent:.2f}% exceeds {threshold:.2f}%"
              )

          print(
              f"Duplication quality gate passed: {duplication_percent:.2f}% <= {threshold:.2f}%"
          )
          PY

      - name: Fetch SonarCloud PR summary
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TEST_COVERAGE_PERCENT: ${{ steps.test_coverage.outputs.coverage_percent }}
          TEST_COVERAGE_HIT: ${{ steps.test_coverage.outputs.coverage_hit }}
          TEST_COVERAGE_FOUND: ${{ steps.test_coverage.outputs.coverage_found }}
        run: |
          PROJECT_KEY="$(sed -n 's/^sonar.projectKey=\(.*\)$/\1/p' sonar-project.properties)"

          if [[ -z "$PROJECT_KEY" ]]; then
            echo "Unable to find sonar.projectKey in sonar-project.properties"
            exit 1
          fi

          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"

          curl -sS -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}&pullRequest=${PR_NUMBER}" \
            -o quality_gate.json

          curl -sS -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&pullRequest=${PR_NUMBER}&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density" \
            -o measures.json

          python3 - <<'PY'
          import os
          import json
          from pathlib import Path

          quality_gate = json.loads(Path("quality_gate.json").read_text())
          measures = json.loads(Path("measures.json").read_text())

          status = quality_gate.get("projectStatus", {}).get("status", "UNKNOWN")
          conditions = quality_gate.get("projectStatus", {}).get("conditions", [])
          metric_map = {}
          for measure in measures.get("component", {}).get("measures", []):
              metric_map[measure.get("metric", "")] = measure.get("value", "n/a")

          lines = []
          lines.append("<!-- sonarcloud-pr-summary -->")
          lines.append("## SonarCloud Summary")
          lines.append("")
          lines.append(f"- Quality Gate: **{status}**")
          lines.append(f"- Bugs: **{metric_map.get('bugs', 'n/a')}**")
          lines.append(f"- Vulnerabilities: **{metric_map.get('vulnerabilities', 'n/a')}**")
          lines.append(f"- Code Smells: **{metric_map.get('code_smells', 'n/a')}**")
          lines.append(f"- Coverage: **{metric_map.get('coverage', 'n/a')}%**")
          test_coverage_percent = os.environ.get("TEST_COVERAGE_PERCENT")
          test_coverage_hit = os.environ.get("TEST_COVERAGE_HIT")
          test_coverage_found = os.environ.get("TEST_COVERAGE_FOUND")
          if test_coverage_percent and test_coverage_hit and test_coverage_found:
              lines.append(
                  f"- Test Coverage (lcov): **{test_coverage_percent}%** "
                  f"({test_coverage_hit}/{test_coverage_found} lines)"
              )
          lines.append(f"- Duplications: **{metric_map.get('duplicated_lines_density', 'n/a')}%**")

          failing = [
              condition for condition in conditions
              if condition.get("status") == "ERROR"
          ]
          if failing:
              lines.append("")
              lines.append("### Failing Quality Gate Conditions")
              for condition in failing:
                  metric = condition.get("metricKey", "unknown_metric")
                  actual = condition.get("actualValue", "n/a")
                  expected = condition.get("errorThreshold", "n/a")
                  lines.append(f"- `{metric}` actual `{actual}` vs threshold `{expected}`")

          Path("sonar_pr_comment.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Upsert SonarCloud PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('sonar_pr_comment.md', 'utf8');
            const marker = '<!-- sonarcloud-pr-summary -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
