name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch SonarCloud PR summary
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PROJECT_KEY="$(sed -n 's/^sonar.projectKey=\(.*\)$/\1/p' sonar-project.properties)"

          if [[ -z "$PROJECT_KEY" ]]; then
            echo "Unable to find sonar.projectKey in sonar-project.properties"
            exit 1
          fi

          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"

          curl -sS -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}&pullRequest=${PR_NUMBER}" \
            -o quality_gate.json

          curl -sS -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&pullRequest=${PR_NUMBER}&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density" \
            -o measures.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          quality_gate = json.loads(Path("quality_gate.json").read_text())
          measures = json.loads(Path("measures.json").read_text())

          status = quality_gate.get("projectStatus", {}).get("status", "UNKNOWN")
          conditions = quality_gate.get("projectStatus", {}).get("conditions", [])
          metric_map = {}
          for measure in measures.get("component", {}).get("measures", []):
              metric_map[measure.get("metric", "")] = measure.get("value", "n/a")

          lines = []
          lines.append("<!-- sonarcloud-pr-summary -->")
          lines.append("## SonarCloud Summary")
          lines.append("")
          lines.append(f"- Quality Gate: **{status}**")
          lines.append(f"- Bugs: **{metric_map.get('bugs', 'n/a')}**")
          lines.append(f"- Vulnerabilities: **{metric_map.get('vulnerabilities', 'n/a')}**")
          lines.append(f"- Code Smells: **{metric_map.get('code_smells', 'n/a')}**")
          lines.append(f"- Coverage: **{metric_map.get('coverage', 'n/a')}%**")
          lines.append(f"- Duplications: **{metric_map.get('duplicated_lines_density', 'n/a')}%**")

          failing = [
              condition for condition in conditions
              if condition.get("status") == "ERROR"
          ]
          if failing:
              lines.append("")
              lines.append("### Failing Quality Gate Conditions")
              for condition in failing:
                  metric = condition.get("metricKey", "unknown_metric")
                  actual = condition.get("actualValue", "n/a")
                  expected = condition.get("errorThreshold", "n/a")
                  lines.append(f"- `{metric}` actual `{actual}` vs threshold `{expected}`")

          Path("sonar_pr_comment.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Upsert SonarCloud PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('sonar_pr_comment.md', 'utf8');
            const marker = '<!-- sonarcloud-pr-summary -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
